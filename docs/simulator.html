<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CastScope – キャスティングシミュレーター</title>
<style>
:root{
  --primary:#2563eb;--primary-dark:#1d4ed8;--primary-light:#dbeafe;
  --bg:#f1f5f9;--card:#fff;--text:#1e293b;--muted:#64748b;
  --border:#e2e8f0;--success:#10b981;--warn:#f59e0b;--danger:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic Pro',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* header */
header{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 100%);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:baseline;gap:10px}
.logo h1{font-size:1.6rem;font-weight:800;letter-spacing:.06em}
.logo span{font-size:.78rem;opacity:.7}
nav{display:flex;gap:6px}
.nav-link{color:rgba(255,255,255,.7);text-decoration:none;padding:5px 13px;border-radius:6px;font-size:.8rem;transition:all .15s}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.18);color:#fff}
.nav-info{color:rgba(255,255,255,.85);text-decoration:none;padding:5px 12px;border-radius:6px;font-size:.78rem;border:1px solid rgba(255,255,255,.35);transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.nav-info:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.6);color:#fff}

/* layout */
.wrap{max-width:1400px;margin:0 auto;padding:20px 14px}
.sim-layout{display:flex;gap:16px;align-items:flex-start}
.panel-l{width:310px;min-width:270px;position:sticky;top:14px;display:flex;flex-direction:column;gap:12px}
.panel-r{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}

/* card */
.card{background:var(--card);border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.ctitle{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

/* genre filter */
.genre-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.gbtn{padding:4px 10px;border:1px solid var(--border);border-radius:13px;background:#fff;cursor:pointer;font-size:.73rem;color:var(--muted);transition:all .15s;font-family:inherit}
.gbtn:hover{border-color:var(--primary);color:var(--primary)}
.gbtn.on{background:var(--primary);color:#fff;border-color:var(--primary)}

/* search */
.srch{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:7px;font-size:.875rem;outline:none;font-family:inherit;margin-bottom:9px}
.srch:focus{border-color:var(--primary)}

/* talent list */
.tlist{max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:7px}
.ti{padding:8px 11px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ti:last-child{border-bottom:none}
.ti:hover{background:#f0f7ff}
.ti.sel{background:var(--primary-light)}
.ti.dis{opacity:.38;cursor:not-allowed;pointer-events:none}
.ti-name{font-weight:600;font-size:.84rem}
.ti-sub{font-size:.7rem;color:var(--muted)}
.ti-score{font-size:.73rem;font-weight:600;color:var(--primary);background:var(--primary-light);padding:2px 6px;border-radius:7px;margin-left:auto;white-space:nowrap}
.ti.sel .ti-score{background:rgba(255,255,255,.6)}

/* chips */
.chips-hd{font-size:.74rem;color:var(--muted);font-weight:600;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:5px;min-height:28px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--primary);color:#fff;border-radius:14px;padding:3px 9px 3px 11px;font-size:.76rem;font-weight:500}
.chip-x{background:none;border:none;color:rgba(255,255,255,.75);cursor:pointer;font-size:.95rem;line-height:1;padding:0}
.chip-x:hover{color:#fff}
.chips-empty{font-size:.76rem;color:#cbd5e1;font-style:italic;align-self:center}

/* settings */
.sg{margin-bottom:13px}
.sg:last-child{margin-bottom:0}
.slbl{font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:7px;display:block}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rb{display:flex;align-items:center;gap:7px;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;transition:all .15s;font-size:.82rem;font-family:inherit;background:#fff;text-align:left;color:var(--text)}
.rb:hover{border-color:var(--primary)}
.rb.on{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:600}
.rdot{width:13px;height:13px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;position:relative}
.rb.on .rdot::after{content:'';position:absolute;top:2px;left:2px;width:5px;height:5px;background:var(--primary);border-radius:50%}

/* media tabs */
.media-tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px}
.mtab{padding:5px 11px;border:1.5px solid var(--border);border-radius:16px;background:#fff;cursor:pointer;font-size:.77rem;color:var(--muted);transition:all .15s;font-family:inherit;font-weight:500;white-space:nowrap}
.mtab:hover{border-color:var(--primary);color:var(--primary)}
.mtab.on{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700}
.sub-sg{margin-bottom:11px}
.sub-sg:last-child{margin-bottom:0}

/* kana row */
.kana-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.kbtn{padding:3px 7px;border:1px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;font-size:.7rem;color:var(--muted);transition:all .12s;font-family:inherit;min-width:28px;text-align:center}
.kbtn:hover{border-color:var(--primary);color:var(--primary)}
.kbtn.on{background:var(--primary);color:#fff;border-color:var(--primary)}
/* filter row */
.filter-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.genre-sel{flex:0 0 auto;padding:6px 7px;border:1px solid var(--border);border-radius:7px;font-size:.76rem;outline:none;font-family:inherit;background:#fff;color:var(--text);cursor:pointer;max-width:138px}
.genre-sel:focus{border-color:var(--primary)}
.srch-inline{flex:1;min-width:0;padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:.81rem;outline:none;font-family:inherit}
.srch-inline:focus{border-color:var(--primary)}
/* sort row */
.sort-row{display:flex;gap:5px;margin-bottom:9px}
.sort-btn{flex:1;padding:4px 5px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:.7rem;color:var(--muted);transition:all .12s;font-family:inherit;font-weight:500;white-space:nowrap}
.sort-btn:hover{border-color:var(--primary);color:var(--primary)}
.sort-btn.on{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700}
/* mini sections (recent / favs) */
.mini-sec{margin-bottom:10px;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.mini-hd{padding:5px 10px;background:var(--bg);font-size:.7rem;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border)}
.mini-ti{padding:6px 10px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:.79rem}
.mini-ti:last-child{border-bottom:none}
.mini-ti:hover{background:#f0f7ff}
.mini-ti.sel{background:var(--primary-light)}
.mini-ti.dis{opacity:.38;cursor:not-allowed;pointer-events:none}
.mini-ti-name{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-ti-sub{font-size:.67rem;color:var(--muted);white-space:nowrap}
.mini-ti-score{font-size:.7rem;font-weight:600;color:var(--primary);background:var(--primary-light);padding:1px 5px;border-radius:5px;white-space:nowrap}
/* fav button */
.fav-btn{background:none;border:none;cursor:pointer;font-size:.87rem;padding:0 2px;color:#cbd5e1;line-height:1;flex-shrink:0;transition:color .12s}
.fav-btn:hover{color:#f59e0b}
.fav-btn.on{color:#f59e0b}
/* genre group header in list */
.genre-ghd{padding:5px 11px;font-size:.68rem;font-weight:700;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1;text-transform:uppercase;letter-spacing:.04em}

/* simulate button */
.sim-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s;font-family:inherit;letter-spacing:.03em}
.sim-btn:hover:not(:disabled){background:var(--primary-dark)}
.sim-btn:disabled{opacity:.45;cursor:not-allowed}

/* metric row */
.m-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.mc{background:var(--card);border-radius:10px;padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.mc .ml{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.mc .mv{font-size:1.35rem;font-weight:800;color:var(--primary);margin-top:4px;line-height:1.1}
.mc .ms{font-size:.7rem;color:var(--muted);margin-top:3px}
.risk-low{color:var(--success)!important}
.risk-mid{color:var(--warn)!important}
.risk-high{color:var(--danger)!important}
.unit{font-size:.65em;font-weight:400}

/* demographics */
.demo-legend{display:flex;gap:14px;margin-bottom:9px;font-size:.74rem}
.ldot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.demo-grid{display:grid;gap:5px}
.demo-row{display:grid;grid-template-columns:52px 1fr 44px 1fr 52px;align-items:center;gap:6px}
.d-age{font-size:.73rem;font-weight:600;color:var(--muted);text-align:center}
.d-wrap{height:13px;background:var(--bg);border-radius:3px;overflow:hidden}
.d-bm{height:100%;background:#2563eb;border-radius:3px;transition:width .5s ease}
.d-bf{height:100%;background:#ec4899;border-radius:3px;transition:width .5s ease}
.d-pct{font-size:.7rem;font-weight:600;white-space:nowrap}
.d-pct-m{color:#2563eb;text-align:right}
.d-pct-f{color:#ec4899;text-align:left}

/* talent score cards */
.tc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.tc{background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--border)}
.tc-name{font-weight:700;font-size:.84rem;margin-bottom:6px}
.tc-tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:.68rem;font-weight:500;background:var(--primary-light);color:var(--primary);margin-bottom:8px}
.tc-row{display:flex;justify-content:space-between;font-size:.74rem;padding:2px 0;border-bottom:1px solid var(--border)}
.tc-row:last-of-type{border-bottom:none}
.tc-k{color:var(--muted)}
.tc-v{font-weight:600}
.tc-score-box{text-align:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.tc-big{font-size:1.45rem;font-weight:800;color:var(--primary)}
.tc-slbl{font-size:.68rem;color:var(--muted)}

/* fit bar */
.fit-bar-wrap{background:var(--border);border-radius:3px;height:5px;margin-top:3px;overflow:hidden}
.fit-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#2563eb,#7c3aed);transition:width .5s}

/* export */
.exp-row{display:flex;gap:10px}
.exp-btn{flex:1;padding:10px 14px;border-radius:7px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text)}
.exp-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ai insight */
.ibadge{padding:2px 9px;border-radius:10px;font-size:.72rem;font-weight:600}
.ib-g{background:#d1fae5;color:#065f46}
.ib-a{background:#fef3c7;color:#92400e}
.ib-r{background:#fee2e2;color:#991b1b}
.ib-b{background:var(--primary-light);color:var(--primary)}
/* insight rich redesign */
.ins-section{padding:15px 0;border-bottom:1px solid var(--border)}
.ins-section:last-child{border-bottom:none;padding-bottom:4px}
.ins-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ins-icon{font-size:1.05rem;flex-shrink:0}
.ins-title{font-size:.8rem;font-weight:800;color:var(--text);flex:1}
.ins-body{font-size:.875rem;line-height:1.85;color:var(--text)}
.ins-body p{margin-bottom:5px}
.ins-body p:last-child{margin-bottom:0}
.ins-hl{font-weight:700;color:var(--primary)}
.ins-hlg{font-weight:700;color:#059669}
.ins-hlr{font-weight:700;color:#dc2626}
.ins-hla{font-weight:700;color:#d97706}
.ins-nm{font-weight:700}
.ins-num{font-weight:800;font-variant-numeric:tabular-nums}
.ins-star-row{display:flex;align-items:center;gap:12px;margin:8px 0}
.ins-stars{font-size:1.4rem;letter-spacing:3px;line-height:1}
.ins-rec-box{background:var(--primary-light);border-left:4px solid var(--primary);padding:11px 14px;border-radius:0 8px 8px 0;margin-top:8px;font-size:.855rem;line-height:1.7;color:var(--text)}

/* print */
@media print{
  header,.panel-l,.settings-card,.sim-btn-wrap,.exp-row,nav{display:none!important}
  .sim-layout{display:block}
  body{background:#fff}
  .m-row{grid-template-columns:repeat(4,1fr)}
}

/* responsive */
@media(max-width:900px){
  .sim-layout{flex-direction:column}
  .panel-l{width:100%;position:static}
  .m-row{grid-template-columns:1fr 1fr}
}
@media(max-width:560px){
  .m-row{grid-template-columns:1fr 1fr}
  .rg{grid-template-columns:1fr 1fr}
  header{padding:12px 16px}
  .logo h1{font-size:1.25rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>CastScope</h1>
    <span>キャスティングシミュレーター</span>
  </div>
  <nav>
    <a href="./about-score.html" target="_blank" class="nav-info">📊 スコア算出ロジックを見る</a>
    <a href="./simulator.html" class="nav-link active">シミュレーター</a>
  </nav>
</header>

<div class="wrap">
<div class="sim-layout">

  <!-- ── Left: Talent Selection ── -->
  <aside class="panel-l">
    <div class="card">
      <div class="ctitle">タレントを選ぶ（最大5人）</div>

      <div id="recent-sec" class="mini-sec" style="display:none">
        <div class="mini-hd">🕐 最近選んだタレント</div>
        <div id="recent-list"></div>
      </div>

      <div id="fav-sec" class="mini-sec" style="display:none">
        <div class="mini-hd">★ お気に入り</div>
        <div id="fav-list"></div>
      </div>

      <div class="kana-row" id="kana-row">
        <button class="kbtn on" data-k="all">全て</button>
        <button class="kbtn" data-k="a">あ</button>
        <button class="kbtn" data-k="ka">か</button>
        <button class="kbtn" data-k="sa">さ</button>
        <button class="kbtn" data-k="ta">た</button>
        <button class="kbtn" data-k="na">な</button>
        <button class="kbtn" data-k="ha">は</button>
        <button class="kbtn" data-k="ma">ま</button>
        <button class="kbtn" data-k="ya">や</button>
        <button class="kbtn" data-k="ra">ら</button>
        <button class="kbtn" data-k="wa">わ</button>
      </div>

      <div class="filter-row">
        <select class="genre-sel" id="genre-sel"><option value="all">すべてのジャンル</option></select>
        <input class="srch-inline" id="q" type="text" placeholder="🔍 タレント名で検索...">
      </div>

      <div class="sort-row">
        <button class="sort-btn on" data-s="score">スコア順</button>
        <button class="sort-btn" data-s="kana">五十音順</button>
        <button class="sort-btn" data-s="genre">ジャンル順</button>
      </div>

      <div class="tlist" id="tlist">
        <div style="padding:20px;text-align:center;color:#94a3b8;font-size:.82rem">読み込み中…</div>
      </div>
    </div>
    <div class="card">
      <div class="chips-hd">選択中 <span id="sel-count">0</span>/5</div>
      <div class="chips" id="chips">
        <span class="chips-empty">タレントを選択してください</span>
      </div>
    </div>
  </aside>

  <!-- ── Right ── -->
  <div class="panel-r">

    <!-- Settings -->
    <div class="card settings-card">
      <div class="ctitle">メディア設定</div>
      <div class="media-tabs" id="media-tabs">
        <button class="mtab on" data-m="tv">📺 テレビ</button>
        <button class="mtab" data-m="cm">📣 CM</button>
        <button class="mtab" data-m="movie">🎬 映画</button>
        <button class="mtab" data-m="magazine">📚 出版</button>
        <button class="mtab" data-m="newspaper">🗞 新聞</button>
        <button class="mtab" data-m="sns">📱 SNS</button>
        <button class="mtab" data-m="web">🌐 WEB</button>
      </div>
      <div id="media-sub"></div>
    </div>

    <div class="sim-btn-wrap">
      <button class="sim-btn" id="sim-btn" disabled>タレントを選択してください</button>
    </div>

    <!-- Results (hidden until simulated) -->
    <div id="results" style="display:none">

      <div class="m-row" id="m-row"></div>

      <div class="card">
        <div class="ctitle">年代 × 性別　視聴意向マップ</div>
        <div class="demo-legend">
          <span><span class="ldot" style="background:#2563eb"></span>男性</span>
          <span><span class="ldot" style="background:#ec4899"></span>女性</span>
        </div>
        <div class="demo-grid" id="demo-grid"></div>
      </div>

      <div class="card">
        <div class="ctitle">タレント個別スコアカード</div>
        <div class="tc-grid" id="tc-grid"></div>
      </div>

      <div class="card">
        <div class="ctitle">AI 考察</div>
        <div id="insight-body"></div>
      </div>

      <div class="card">
        <div class="ctitle">レポート出力</div>
        <div class="exp-row">
          <button class="exp-btn" id="btn-png">📷 PNG 保存</button>
          <button class="exp-btn" id="btn-pdf">🖨 PDF 出力</button>
        </div>
      </div>

    </div><!-- /results -->
  </div><!-- /panel-r -->
</div><!-- /sim-layout -->
</div><!-- /wrap -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
  integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
// ── 定数 ──────────────────────────────────────────────────
// テレビ内サブ乗数
const TV_GENRE_MULT = {drama:1.0, variety:0.85, news:0.72, sports:0.78, music:0.75};
const TV_SLOT_MULT  = {prime:1.0, noon:0.50, late:0.36, morning:0.42, holiday:0.70};

// メディア乗数
const MEDIA_MULT = {tv:1.0, cm:0.88, movie:0.92, magazine:0.70, newspaper:0.65, sns:0.95, web:0.80};

// メディア表示ラベル・指標名
const MEDIA_LBL = {tv:'テレビ', cm:'CM', movie:'映画', magazine:'出版(雑誌)', newspaper:'新聞', sns:'SNS', web:'WEBサイト'};
const MEDIA_METRIC = {
  tv:        {lbl:'推定視聴率',   unit:'%'},
  cm:        {lbl:'推定認知率',   unit:'pt'},
  movie:     {lbl:'推定動員力',   unit:'pt'},
  magazine:  {lbl:'推定話題性',   unit:'pt'},
  newspaper: {lbl:'推定閲読効果', unit:'pt'},
  sns:       {lbl:'推定リーチ力', unit:'pt'},
  web:       {lbl:'推定クリック力',unit:'pt'},
};

// メディア別スコア重み
const MEDIA_WEIGHTS = {
  tv:       {trends:0.30, yt_views:0.20, news:0.20, wiki:0.10, sentiment:0.15, yt_subs:0.05},
  cm:       {trends:0.25, yt_views:0.15, news:0.15, wiki:0.05, sentiment:0.30, yt_subs:0.10},
  movie:    {trends:0.20, yt_views:0.25, news:0.20, wiki:0.15, sentiment:0.15, yt_subs:0.05},
  magazine: {trends:0.15, yt_views:0.10, news:0.20, wiki:0.10, sentiment:0.25, yt_subs:0.20},
  newspaper:{trends:0.20, yt_views:0.05, news:0.35, wiki:0.15, sentiment:0.20, yt_subs:0.05},
  sns:      {trends:0.20, yt_views:0.30, news:0.10, wiki:0.05, sentiment:0.10, yt_subs:0.25},
  web:      {trends:0.25, yt_views:0.25, news:0.15, wiki:0.10, sentiment:0.15, yt_subs:0.10},
};

// ── あいうえお行判定 ──────────────────────────────────────
function getSyllRow(t) {
  const reading = t.reading || t.kana || '';
  if (reading) {
    const code = reading.charCodeAt(0);
    // katakana → hiragana
    const h = (code >= 0x30A1 && code <= 0x30F6) ? code - 0x60 : code;
    if (h >= 0x3042 && h <= 0x304A) return 'a';
    if (h >= 0x304B && h <= 0x3054) return 'ka';
    if (h >= 0x3055 && h <= 0x305E) return 'sa';
    if (h >= 0x305F && h <= 0x3069) return 'ta';
    if (h >= 0x306A && h <= 0x306E) return 'na';
    if (h >= 0x306F && h <= 0x307D) return 'ha';
    if (h >= 0x307E && h <= 0x3082) return 'ma';
    if (h >= 0x3083 && h <= 0x3088) return 'ya';
    if (h >= 0x3089 && h <= 0x308D) return 'ra';
    if (h >= 0x308E && h <= 0x3093) return 'wa';
    return 'other';
  }
  // name_en の苗字（末尾語）の頭文字で判定
  const parts = (t.name_en || '').trim().split(/\s+/);
  const c = (parts[parts.length - 1] || '')[0]?.toLowerCase() || '';
  if (!c) return 'other';
  if (/[aiueo]/.test(c)) return 'a';
  if (c === 'k') return 'ka';
  if (c === 's') return 'sa';
  if (c === 't') return 'ta';
  if (c === 'n') return 'na';
  if (c === 'h') return 'ha';
  if (c === 'm') return 'ma';
  if (c === 'y') return 'ya';
  if (c === 'r') return 'ra';
  if (c === 'w') return 'wa';
  return 'other';
}

function getKanaKey(t) {
  if (t.reading || t.kana) return (t.reading || t.kana);
  const parts = (t.name_en || '').trim().split(/\s+/);
  return (parts[parts.length - 1] || '') + ' ' + (parts[0] || '');
}

// ── フィルターUI構築 ──────────────────────────────────────
function buildFilterControls() {
  // ジャンルドロップダウン
  const genres = [...new Set(allT.map(t => t.genre))].sort((a, b) => {
    const oi = GENRE_ORDER.indexOf(a), oj = GENRE_ORDER.indexOf(b);
    if (oi >= 0 && oj >= 0) return oi - oj;
    if (oi >= 0) return -1; if (oj >= 0) return 1;
    return a.localeCompare(b, 'ja');
  });
  const sel = document.getElementById('genre-sel');
  genres.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g; sel.appendChild(opt);
  });
  sel.onchange = () => { genreFilter = sel.value; filterList(); };

  // あいうえお行
  document.querySelectorAll('.kbtn').forEach(b => {
    b.onclick = () => {
      syllFilter = b.dataset.k;
      document.querySelectorAll('.kbtn').forEach(x => x.classList.toggle('on', x.dataset.k === syllFilter));
      filterList();
    };
  });

  // ソート
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.onclick = () => {
      sortMode = b.dataset.s;
      document.querySelectorAll('.sort-btn').forEach(x => x.classList.toggle('on', x.dataset.s === sortMode));
      filterList();
    };
  });
}

// ── タレントアイテム描画 ──────────────────────────────────
function renderTalentItem(t) {
  const isSel = selT.some(s => s.id === t.id);
  const isFull = !isSel && selT.length >= 5;
  const sc = t.latest?.score ?? '–';
  const isFav = favIds.has(t.id);
  return `<div class="ti${isSel?' sel':''}${isFull?' dis':''}" data-id="${t.id}">
    <div style="min-width:0;flex:1"><div class="ti-name">${t.name}</div><div class="ti-sub">${t.genre}</div></div>
    <button class="fav-btn${isFav?' on':''}" data-id="${t.id}" title="お気に入り">★</button>
    <span class="ti-score">${sc}</span>
  </div>`;
}

function renderTalentList(list) {
  const el = document.getElementById('tlist');
  if (!list.length) {
    el.innerHTML = '<div style="padding:14px;text-align:center;color:#94a3b8;font-size:.8rem">該当なし</div>';
    return;
  }
  if (sortMode === 'genre') {
    const groups = {};
    list.forEach(t => { if (!groups[t.genre]) groups[t.genre] = []; groups[t.genre].push(t); });
    const sortedG = Object.keys(groups).sort((a, b) => {
      const oi = GENRE_ORDER.indexOf(a), oj = GENRE_ORDER.indexOf(b);
      if (oi >= 0 && oj >= 0) return oi - oj;
      if (oi >= 0) return -1; if (oj >= 0) return 1;
      return a.localeCompare(b, 'ja');
    });
    el.innerHTML = sortedG.map(g =>
      `<div class="genre-ghd">${g} <span style="font-weight:400;opacity:.6">(${groups[g].length})</span></div>` +
      groups[g].map(t => renderTalentItem(t)).join('')
    ).join('');
  } else {
    el.innerHTML = list.slice(0, 120).map(t => renderTalentItem(t)).join('');
  }
  el.querySelectorAll('.ti:not(.dis)').forEach(e => {
    e.onclick = () => toggleT(+e.dataset.id);
  });
  el.querySelectorAll('.fav-btn').forEach(b => {
    b.onclick = ev => { ev.stopPropagation(); toggleFav(+b.dataset.id); };
  });
}

function filterList() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  let list = allT.filter(t => {
    if (syllFilter !== 'all' && getSyllRow(t) !== syllFilter) return false;
    if (genreFilter !== 'all' && t.genre !== genreFilter) return false;
    if (q && !t.name.includes(q) && !(t.name_en || '').toLowerCase().includes(q)) return false;
    return true;
  });
  if (sortMode === 'score') {
    list = list.slice().sort((a, b) => (b.latest?.score ?? 0) - (a.latest?.score ?? 0));
  } else if (sortMode === 'kana') {
    list = list.slice().sort((a, b) => getKanaKey(a).localeCompare(getKanaKey(b)));
  } else {
    list = list.slice().sort((a, b) => {
      const oi = GENRE_ORDER.indexOf(a.genre), oj = GENRE_ORDER.indexOf(b.genre);
      if (oi !== oj) {
        if (oi >= 0 && oj >= 0) return oi - oj;
        if (oi >= 0) return -1; if (oj >= 0) return 1;
      }
      return (b.latest?.score ?? 0) - (a.latest?.score ?? 0);
    });
  }
  renderTalentList(list);
}

// ── 最近選んだ / お気に入り ───────────────────────────────
function renderMiniList(containerId, talents) {
  const el = document.getElementById(containerId);
  el.innerHTML = talents.map(t => {
    const isSel = selT.some(s => s.id === t.id);
    const isFull = !isSel && selT.length >= 5;
    return `<div class="mini-ti${isSel?' sel':''}${isFull?' dis':''}" data-id="${t.id}">
      <span class="mini-ti-name">${t.name}</span>
      <span class="mini-ti-sub">${t.genre}</span>
      <span class="mini-ti-score">${t.latest?.score ?? '–'}</span>
    </div>`;
  }).join('');
  el.querySelectorAll('.mini-ti:not(.dis)').forEach(e => {
    e.onclick = () => toggleT(+e.dataset.id);
  });
}

function renderRecent() {
  const sec = document.getElementById('recent-sec');
  const recent = recentIds.map(id => allT.find(t => t.id === id)).filter(Boolean);
  if (!recent.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  renderMiniList('recent-list', recent);
}

function renderFavSection() {
  const sec = document.getElementById('fav-sec');
  const favs = [...favIds].map(id => allT.find(t => t.id === id)).filter(Boolean);
  if (!favs.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  renderMiniList('fav-list', favs);
}

function toggleFav(id) {
  if (favIds.has(id)) favIds.delete(id); else favIds.add(id);
  try { localStorage.setItem('cs_favs', JSON.stringify([...favIds])); } catch(e) {}
  filterList();
  renderFavSection();
}

function addRecent(id) {
  recentIds = recentIds.filter(i => i !== id);
  recentIds.unshift(id);
  if (recentIds.length > 5) recentIds.length = 5;
  try { localStorage.setItem('cs_recent', JSON.stringify(recentIds)); } catch(e) {}
  renderRecent();
}

function toggleT(id) {
  const idx = selT.findIndex(s => s.id === id);
  if (idx >= 0) { selT.splice(idx, 1); }
  else {
    if (selT.length >= 5) return;
    const t = allT.find(t => t.id === id);
    if (t) { selT.push(t); addRecent(id); }
  }
  filterList();
  renderChips();
  renderRecent();
  renderFavSection();
  updateBtn();
}

function renderChips() {
  const el = document.getElementById('chips');
  document.getElementById('sel-count').textContent = selT.length;
  if (!selT.length) {
    el.innerHTML = '<span class="chips-empty">タレントを選択してください</span>';
    return;
  }
  el.innerHTML = selT.map(t =>
    `<span class="chip">${t.name}<button class="chip-x" data-id="${t.id}">×</button></span>`
  ).join('');
  el.querySelectorAll('.chip-x').forEach(b => { b.onclick = () => toggleT(+b.dataset.id); });
}

function updateBtn() {
  const btn = document.getElementById('sim-btn');
  btn.disabled = !selT.length;
  btn.textContent = selT.length ? `${selT.length}人でシミュレーション実行` : 'タレントを選択してください';
}

// ── メディア設定 ──────────────────────────────────────────
function buildMediaSub() {
  const defs = MEDIA_SUB_DEF[mediaType] || [];
  const el = document.getElementById('media-sub');
  el.innerHTML = defs.map(g => {
    const cols = g.opts.length <= 2 ? 2 : g.opts.length >= 5 ? 3 : 2;
    return `<div class="sub-sg">
      <span class="slbl">${g.lbl}</span>
      <div class="rg" style="grid-template-columns:repeat(${cols},1fr)">
        ${g.opts.map((o,i) => `<button class="rb${(mediaOpts[g.key]===o.v||(mediaOpts[g.key]==null&&i===0))?' on':''}" data-key="${g.key}" data-v="${o.v}"><span class="rdot"></span>${o.l}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.rb').forEach(b => {
    b.onclick = () => {
      const key = b.dataset.key;
      el.querySelectorAll(`.rb[data-key="${key}"]`).forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      mediaOpts[key] = b.dataset.v;
    };
  });
}

function setMediaType(m) {
  mediaType = m;
  mediaOpts = {};
  (MEDIA_SUB_DEF[m] || []).forEach(g => { mediaOpts[g.key] = g.opts[0].v; });
  document.querySelectorAll('.mtab').forEach(b => b.classList.toggle('on', b.dataset.m === m));
  buildMediaSub();
}

document.getElementById('media-tabs').querySelectorAll('.mtab').forEach(b => {
  b.onclick = () => setMediaType(b.dataset.m);
});
setMediaType('tv');

document.getElementById('q').addEventListener('input', filterList);
document.getElementById('sim-btn').onclick = simulate;

// ── 計算ロジック ───────────────────────────────────────────
const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const fmt2 = n => n == null ? '–' : Number(n).toLocaleString('ja-JP');

function simulate() {
  if (!selT.length) return;

  const scores = selT.map(t => t.latest?.score ?? 0);
  const base   = avg(scores);
  const W      = MEDIA_WEIGHTS[mediaType];

  /* メディア別乗数 */
  const fm = mediaType === 'tv'
    ? (TV_GENRE_MULT[mediaOpts.genre] ?? 1.0) * (TV_SLOT_MULT[mediaOpts.slot] ?? 1.0)
    : (MEDIA_MULT[mediaType] ?? 0.80);

  /* favor_scores.json 統合 */
  const favScores = selT.map(t => favMap[t.name]).filter(v => v != null);
  const avgFav    = favScores.length ? avg(favScores) : null;

  /* 1. 推定指標値 */
  const awarenessBonus = avgFav != null ? ((avgFav - 50) / 50) * 1.2 : 0;
  const br   = (base / 100) * 14.5 * fm + 0.6 + awarenessBonus;
  const intentFactor = avgFav != null ? avgFav / 100 : 0.5;
  const spread = 0.18 - intentFactor * 0.06;
  const rLo  = Math.max(0.3, br * (1 - spread)).toFixed(1);
  const rHi  = Math.min(25,  br * (1 + spread)).toFixed(1);
  const isTV = mediaType === 'tv';
  const { lbl: rLbl, unit: rUnit } = MEDIA_METRIC[mediaType];

  /* 2. SNSバズスコア（メディア別重み） */
  const buzz = Math.round(clamp(avg(selT.map(t => {
    const l = t.latest; let s=0, w=0;
    if (l.trend_score    != null) { const wt=W.trends*100;    s+=l.trend_score*wt;                                        w+=wt; }
    if (l.yt_avg_views   != null) { const wt=W.yt_views*100;  s+=clamp(Math.log10(l.yt_avg_views+1)/6*100,0,100)*wt;    w+=wt; }
    if (l.news_count     != null) { const wt=W.news*100;      s+=clamp(l.news_count/3,0,100)*wt;                         w+=wt; }
    if (l.wiki_pageviews != null) { const wt=W.wiki*100;      s+=clamp(l.wiki_pageviews/1000,0,100)*wt;                  w+=wt; }
    if (l.news_sentiment != null) { const wt=W.sentiment*100; s+=l.news_sentiment*wt;                                     w+=wt; }
    if (l.yt_subscribers != null) { const wt=W.yt_subs*100;   s+=clamp(Math.log10(l.yt_subscribers+1)/7*100,0,100)*wt;  w+=wt; }
    return w > 0 ? s/w : 0;
  })), 0, 100));

  /* 3. 相性スコア */
  const fitMap      = mediaType === 'tv' ? (TV_GENRE_FIT[mediaOpts.genre] ?? MEDIA_FIT.tv) : MEDIA_FIT[mediaType];
  const fitAvg      = avg(selT.map(t => fitMap?.[t.genre] ?? 55));
  const uniqGenre   = [...new Set(selT.map(t=>t.genre))].length;
  const diverseBonus= Math.min((uniqGenre-1)*12, 24);
  const variance    = avg(scores.map(s=>(s-base)**2));
  const balance     = clamp(28 - variance/22, 0, 28);
  const favCompatBonus = avgFav != null ? Math.round((avgFav - 50) / 50 * 12) : 0;
  const compat      = Math.round(clamp(18 + diverseBonus + balance + fitAvg*0.28 + favCompatBonus, 0, 99));

  /* 4. 炎上リスク */
  const riskVal = avg(selT.map(t => {
    const trend = t.latest.trend_score ?? 10;
    const news  = t.latest.news_count  ?? 50;
    return news / Math.max(trend, 4);
  }));
  let riskKey = riskVal > 9 ? 'high' : riskVal > 4.5 ? 'mid' : 'low';
  const sentScores = selT.map(t => t.latest?.news_sentiment).filter(v => v != null);
  if (sentScores.length > 0 && avg(sentScores) <= 30) riskKey = 'high';
  const RLBL = {high:'高',mid:'中',low:'低'};

  /* 5. デモグラフィック（メディア別補正） */
  const AGES = ['10代','20代','30代','40代','50代+'];
  const MK   = ['M10','M20','M30','M40','M50'];
  const FK   = ['F10','F20','F30','F40','F50'];
  const demoAdj = {
    tv:       (k,v) => mediaOpts.genre==='drama'   ? (k.startsWith('F')?v*1.08:v*0.92)
                     : mediaOpts.genre==='variety'  ? (k.startsWith('F')?v*0.93:v*1.08) : v,
    cm:       (k,v) => v,
    movie:    (k,v) => k.endsWith('20')||k.endsWith('30') ? v*1.08 : v*0.92,
    magazine: (k,v) => k.startsWith('F') ? v*1.12 : v*0.88,
    newspaper:(k,v) => k.endsWith('40')||k.endsWith('50') ? v*1.12 : v*0.88,
    sns:      (k,v) => k.endsWith('10')||k.endsWith('20') ? v*1.15 : v*0.82,
    web:      (k,v) => k.endsWith('20')||k.endsWith('30') ? v*1.10 : v*0.90,
  };
  const adj  = demoAdj[mediaType] || ((k,v) => v);
  const demoM = MK.map(k => Math.round(clamp(adj(k, avg(selT.map(t=>(GENRE_DEMO[t.genre]??DEMO_DEF)[k]??40))), 3, 99)));
  const demoF = FK.map(k => Math.round(clamp(adj(k, avg(selT.map(t=>(GENRE_DEMO[t.genre]??DEMO_DEF)[k]??40))), 3, 99)));

  // ── 描画 ─────────────────────────────────────────────────
  const mediaLblStr = MEDIA_LBL[mediaType];
  const tvGenreLbl  = {drama:'ドラマ',variety:'バラエティ',news:'情報・報道',sports:'スポーツ',music:'音楽'}[mediaOpts.genre] || '';
  const tvSlotLbl   = {prime:'プライム',noon:'昼',late:'深夜',morning:'朝',holiday:'休日午後'}[mediaOpts.slot] || '';
  const contextLbl  = isTV ? `${tvSlotLbl}${tvGenreLbl}` : mediaLblStr;

  /* Metric cards */
  const favNote = avgFav != null ? `（好感度${Math.round(avgFav)}補正済）` : '';
  document.getElementById('m-row').innerHTML = `
    <div class="mc">
      <div class="ml">${rLbl}</div>
      <div class="mv">${rLo}〜${rHi}<span class="unit">${rUnit}</span></div>
      <div class="ms">${contextLbl}${favNote}</div>
    </div>
    <div class="mc">
      <div class="ml">SNSバズスコア</div>
      <div class="mv">${buzz}<span class="unit">/100</span></div>
      <div class="ms">${mediaLblStr}重み最適化済み</div>
    </div>
    <div class="mc">
      <div class="ml">相性スコア</div>
      <div class="mv">${compat}<span class="unit">/100</span></div>
      <div class="ms">キャスト相関${avgFav != null ? '＋好感度' : ''}</div>
    </div>
    <div class="mc">
      <div class="ml">炎上リスク</div>
      <div class="mv risk-${riskKey}">${RLBL[riskKey]}</div>
      <div class="ms">ネガティブ露出</div>
    </div>`;

  /* Demographics */
  document.getElementById('demo-grid').innerHTML = AGES.map((age,i) => `
    <div class="demo-row">
      <div class="d-pct d-pct-m">${demoM[i]}%</div>
      <div class="d-wrap" style="direction:rtl"><div class="d-bm" style="width:${demoM[i]}%"></div></div>
      <div class="d-age">${age}</div>
      <div class="d-wrap"><div class="d-bf" style="width:${demoF[i]}%"></div></div>
      <div class="d-pct d-pct-f">${demoF[i]}%</div>
    </div>`).join('');

  /* Talent cards */
  document.getElementById('tc-grid').innerHTML = selT.map(t => {
    const l            = t.latest;
    const mediaFitVal  = MEDIA_FIT[mediaType]?.[t.genre] ?? 55;
    const fav          = favMap[t.name] ?? null;
    return `<div class="tc">
      <div class="tc-name">${t.name}</div>
      <div class="tc-tag">${t.genre}</div>
      <div class="tc-row"><span class="tc-k">Trends</span><span class="tc-v">${fmt2(l.trend_score)}</span></div>
      <div class="tc-row"><span class="tc-k">YT avg</span><span class="tc-v">${fmt2(l.yt_avg_views)}</span></div>
      <div class="tc-row"><span class="tc-k">News</span><span class="tc-v">${fmt2(l.news_count)}</span></div>
      <div class="tc-row"><span class="tc-k">Wiki PV</span><span class="tc-v">${fmt2(l.wiki_pageviews)}</span></div>
      ${fav != null ? `<div class="tc-row"><span class="tc-k">好感度</span><span class="tc-v" style="color:var(--success)">${fav}</span></div>` : ''}
      <div class="tc-row">
        <span class="tc-k">${mediaLblStr}適性</span>
        <span class="tc-v" style="color:var(--primary);font-weight:700">${mediaFitVal}</span>
      </div>
      <div class="fit-bar-wrap"><div class="fit-bar" style="width:${mediaFitVal}%"></div></div>
      <div class="tc-score-box">
        <div class="tc-big">${l.score ?? '–'}</div>
        <div class="tc-slbl">SNSスコア</div>
      </div>
    </div>`;
  }).join('');

  /* AI 考察 */
  const stars = selT.filter(t => (t.latest?.score ?? 0) >= 70).length;
  const mids  = selT.filter(t => { const s = t.latest?.score ?? 0; return s >= 50 && s < 70; }).length;
  const young = selT.length - stars - mids;
  generateInsights({ stars, mids, young, buzz, compat, riskKey, avgFit: fitAvg, demoM, demoF, uniqGenre, avgFav, rLo, rHi, mediaLbl: mediaLblStr, contextLbl, isTV, rLbl, rUnit });

  const el = document.getElementById('results');
  el.style.display = 'block';
  el.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── AI 考察（3層＋4軸拡張）──────────────────────────────
function generateInsights({ buzz, compat, riskKey, avgFit, demoM, demoF, avgFav, rLo, rHi, mediaLbl, rLbl, rUnit }) {

  // デコレーターヘルパー
  const hl  = v => `<span class="ins-hl">${v}</span>`;
  const hlg = v => `<span class="ins-hlg">${v}</span>`;
  const hlr = v => `<span class="ins-hlr">${v}</span>`;
  const hla = v => `<span class="ins-hla">${v}</span>`;
  const nm  = n => `<span class="ins-nm">「${n}」</span>`;

  // 指標集計（グローバルの selT から直接取得）
  const safeAvg = key => {
    const vals = selT.map(t => t.latest?.[key]).filter(v => v != null);
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
  };
  const avgSentiment = safeAvg('news_sentiment');
  const avgTrend     = safeAvg('trend_score');
  const avgYtSubs    = safeAvg('yt_subscribers');
  const avgYtViews   = safeAvg('yt_avg_views');
  const avgNewsCount = safeAvg('news_count');
  const avgWikiPv    = safeAvg('wiki_pageviews');

  // ── 相対順位計算（全タレント対比）──────────────────────
  const upperPct = (allVals, myVal) => {
    const v = allVals.filter(n => n != null);
    if (!v.length || myVal == null) return null;
    const below = v.filter(n => n < myVal).length;
    return Math.max(1, Math.round((1 - below / v.length) * 100));
  };
  const globalAvg = key => {
    const v = allT.map(t => t.latest?.[key]).filter(n => n != null);
    return v.length ? v.reduce((a,b)=>a+b,0)/v.length : null;
  };
  const selAvgScore  = avg(selT.map(t => t.latest?.score ?? 0));
  const scorePct     = upperPct(allT.map(t => t.latest?.score),     selAvgScore);
  const sentPct      = upperPct(allT.map(t => t.latest?.news_sentiment), avgSentiment);
  const trendGlobal  = globalAvg('trend_score');
  const trendDiff    = (avgTrend != null && trendGlobal != null) ? Math.round(avgTrend - trendGlobal) : null;

  const fmtYt  = v => v >= 10000 ? Math.round(v/10000)+'万' : v.toLocaleString();
  const fmtPv  = v => v >= 1000 ? (v/1000).toFixed(1)+'k' : Math.round(v)+'';
  const s_sent = avgSentiment != null ? Math.round(avgSentiment)+'点' : '–';
  const s_trnd = avgTrend     != null ? Math.round(avgTrend)+'/100' : '–';
  const s_subs = avgYtSubs    != null ? fmtYt(avgYtSubs)+'人' : '–';
  const s_views= avgYtViews   != null ? fmtYt(avgYtViews)+'再生' : '–';
  const s_news = avgNewsCount  != null ? Math.round(avgNewsCount)+'件' : '–';
  const s_wiki = avgWikiPv    != null ? fmtPv(avgWikiPv)+'PV' : '–';

  // ── Layer 1: メディア適性評価 ─────────────────────────────
  const L1 = [];

  switch (mediaType) {
    case 'tv':
      if (avgSentiment != null && avgSentiment >= 65)
        L1.push(`感情スコアが高く（平均${hl(s_sent)}）、視聴者からの好感・共感を得やすい構成です。ドラマ視聴率への安定した貢献が期待できます。`);
      else if (avgSentiment != null && avgSentiment <= 35)
        L1.push(hlr('感情スコアが低め')+'（平均'+s_sent+'）です。ネガティブ報道の影響を受けやすい状態のため、放送前のパブリックイメージ管理を強化してください。');
      if (avgTrend != null) {
        if (avgTrend >= 60)
          L1.push(`Trendsスコアが${hl(s_trnd)}と高く、放送期間中の話題維持力があります。SNS二次拡散による視聴促進が見込めます。`);
        else if (avgTrend <= 25)
          L1.push(`現時点でのTrendsは${hla(s_trnd)}と控えめですが、出演発表・放送開始による話題の再浮上効果が期待できます。`);
      }
      break;
    case 'cm':
      if (avgSentiment != null && avgSentiment >= 65)
        L1.push(`感情スコアが高く（平均${hl(s_sent)}）、ブランドへの好感転移が生まれやすい構成です。購買意欲への直接貢献が見込めます。`);
      else if (avgSentiment != null && avgSentiment <= 35)
        L1.push(hlr('感情スコアが低め')+'（平均'+s_sent+'）です。炎上リスクの観点から、起用前にパブリックイメージの精査を強く推奨します。');
      if (avgYtSubs != null && avgYtSubs >= 300000)
        L1.push(`YouTubeチャンネル登録者数が平均${hl(s_subs)}と豊富で、WEB展開との相乗効果が高いです。デジタルCMでの費用対効果が見込めます。`);
      break;
    case 'movie':
      if (avgWikiPv != null && avgWikiPv >= 500)
        L1.push(`Wiki PVが平均${hl(s_wiki)}と高く、情報感度の高い映画ファン層への認知が既に形成されています。初動動員への貢献が期待できます。`);
      if (avgYtViews != null && avgYtViews >= 100000)
        L1.push(`YouTube再生数が平均${hl(s_views)}と高く、映像コンテンツでの訴求力があります。予告編拡散への貢献が見込めます。`);
      break;
    case 'sns':
      if (avgYtSubs != null && avgYtSubs >= 300000)
        L1.push(`チャンネル登録者数が平均${hl(s_subs)}と多く、フォロワー経由の有機的拡散が強いです。バズ創出のポテンシャルがあります。`);
      if (avgYtViews != null && avgYtViews >= 100000)
        L1.push(`YouTube再生数が平均${hl(s_views)}と高く、動画コンテンツとの親和性があります。リール・ショート動画での訴求に適しています。`);
      break;
    case 'newspaper':
      if (avgNewsCount != null && avgNewsCount >= 30)
        L1.push(`ニュース件数が平均${hl(s_news)}と豊富で、メディア露出実績があります。新聞読者層への認知が既に形成されています。`);
      if (avgSentiment != null && avgSentiment >= 65)
        L1.push(`感情スコアが高く（平均${hl(s_sent)}）、社会的信頼性があります。企業広告・公共広告への適性が高い構成です。`);
      break;
    case 'magazine':
      if (avgSentiment != null && avgSentiment >= 65)
        L1.push(`感情スコアが高く（平均${hl(s_sent)}）、読者との感情的つながりが強い構成です。表紙・巻頭グラビアでの購買促進が期待できます。`);
      if (avgYtSubs != null && avgYtSubs >= 300000)
        L1.push(`チャンネル登録者数が平均${hl(s_subs)}のクロスメディア読者を持ちます。雑誌×SNS連動企画での相乗効果が見込めます。`);
      break;
    case 'web':
      if (avgTrend != null && avgTrend >= 60)
        L1.push(`Trendsスコアが${hl(s_trnd)}と高く、検索流入との連動が強いです。タイアップ記事でのSEO効果が期待できます。`);
      if (avgYtViews != null && avgYtViews >= 100000)
        L1.push(`YouTube再生数が平均${hl(s_views)}と高く、動画広告との親和性があります。プレロール広告でのブランドリフトが見込めます。`);
      break;
  }

  if (!L1.length)
    L1.push(`${mediaLbl}起用として${hl(Math.round(avgFit)+'/100')}のメディア適性スコアを記録しています。指標バランスを踏まえた演出設計で潜在力を最大化してください。`);

  // 相対評価テキストを L1 末尾に追加
  const relLines = [];
  if (scorePct != null)
    relLines.push(`総合スコア${hl(Math.round(selAvgScore)+'点')}は登録タレント中${hl('上位'+scorePct+'%')}水準です。`);
  if (trendDiff != null && Math.abs(trendDiff) >= 5)
    relLines.push(trendDiff > 0
      ? `話題性（Trends）は全体平均を${hl('+'+trendDiff+'ポイント')}上回っています。`
      : `話題性（Trends）は全体平均を${hla(Math.abs(trendDiff)+'ポイント')}下回っています。`);
  if (sentPct != null)
    relLines.push(`感情スコア${hl(Math.round(avgSentiment)+'点')}は全体${hl('上位'+sentPct+'%')}水準です。`);
  if (relLines.length) L1.push(relLines.join(' '));

  // ── Layer 2: ジャンル×サブ設定の適性評価 ────────────────
  let subKey = '', subLbl = '';
  if (mediaType === 'tv') {
    subKey = mediaOpts.genre || 'drama';
    subLbl = {drama:'ドラマ',variety:'バラエティ',news:'情報・報道',sports:'スポーツ',music:'音楽'}[subKey] || subKey;
  } else if (mediaType === 'cm') {
    subKey = mediaOpts.category || 'food';
    subLbl = {food:'食品・飲料',beauty:'化粧品・美容',auto:'自動車',finance:'金融',daily:'日用品',telecom:'通信',ent:'エンタメ'}[subKey] || subKey;
  } else if (mediaType === 'movie') {
    subKey = mediaOpts.role || 'lead';
    subLbl = {lead:'主演',colead:'W主演',support:'助演',voice:'声優'}[subKey] || subKey;
  } else if (mediaType === 'sns') {
    subKey = mediaOpts.platform || 'instagram';
    subLbl = {instagram:'Instagram',x:'X(Twitter)',tiktok:'TikTok',youtube:'YouTube',line:'LINE'}[subKey] || subKey;
  } else if (mediaType === 'magazine') {
    subKey = mediaOpts.genre || 'fashion';
    subLbl = {fashion:'ファッション',weekly:'週刊誌',mens:'男性誌',womens:'女性誌',gravure:'グラビア'}[subKey] || subKey;
  } else if (mediaType === 'newspaper') {
    subKey = mediaOpts.medium || 'national';
    subLbl = {national:'全国紙',sports:'スポーツ紙',local:'地方紙'}[subKey] || subKey;
  } else if (mediaType === 'web') {
    subKey = mediaOpts.format || 'tieup';
    subLbl = {banner:'バナー広告',tieup:'タイアップ記事',ambassador:'ブランドアンバサダー',video:'動画広告'}[subKey] || subKey;
  }

  const L2_MAP = {
    tv_drama:     `ドラマ出演においては${hl('感情移入度')}と${hl('話題継続性')}が鍵となります。感情スコア（平均${s_sent}）はドラマへの視聴者共感の代替指標です。Wiki PVはドラマ期間中の情報検索需要を示す重要指標で、平均${s_wiki}を記録しています。`,
    tv_variety:   `バラエティでは${hl('瞬発的な話題性')}と${hl('親近感')}が視聴率を左右します。Google Trendsの変動パターン（平均${s_trnd}）がキャラクターの面白さと相関します。SNS拡散に即応できる体制が鍵です。`,
    tv_news:      `情報・報道番組では${hl('社会的信頼性')}と${hl('メディア露出実績')}が起用の核となります。感情スコア（平均${s_sent}）と報道件数（平均${s_news}）を総合的に判断してください。`,
    tv_sports:    `スポーツ番組では${hl('親しみやすさ')}と${hl('エネルギー感')}が重視されます。幅広い年代のTrendsの安定性が長期コメンテーター起用の判断基準となります。`,
    tv_music:     `音楽番組ではYouTube再生数が楽曲・パフォーマンスへの関心を示す最重要指標です。平均${hl(s_views)}を記録しています。`,
    cm_food:      `食品CMでは${hl('親しみやすさ')}と${hl('家族層への訴求力')}が核となります。幅広い年代でのTrendsの安定性（平均${s_trnd}）が長期起用の判断基準になります。`,
    cm_beauty:    `化粧品CMでは${hl('憧れ')}・${hl('清潔感')}・${hl('信頼性')}の三要素が購買転換に直結します。感情スコアと好感度の組み合わせが最重要指標で、感情スコアは平均${s_sent}です。`,
    cm_auto:      `自動車CMでは${hl('信頼感')}と${hl('ステータス感')}が重要です。30〜50代男性層への訴求力と社会的信頼性の高い人選が効果を最大化します。`,
    cm_finance:   `金融CMでは${hl('信頼性')}と${hl('安心感')}が必須要件です。感情スコア（平均${s_sent}）と炎上リスクの低さが選定の最優先基準となります。`,
    cm_daily:     `日用品CMでは${hl('生活感')}と${hl('共感度')}が訴求の核です。主婦・ファミリー層へのデモグラフィック適合性を確認してください。`,
    cm_telecom:   `通信CMでは${hl('先進性イメージ')}と${hl('若年層訴求力')}が重要です。チャンネル登録者数（平均${s_subs}）がデジタルネイティブ層へのリーチを示します。`,
    cm_ent:       `エンタメCMでは${hl('話題性')}と${hl('SNS発信力')}が中核です。Trendsスコア（平均${s_trnd}）の高さが告知効果に直結します。`,
    movie_lead:   `主演は作品の集客力に直結します。Wiki PV（平均${s_wiki}）は映画ファン層からの事前期待値、YouTube再生数（平均${s_views}）は予告編拡散力の代替指標です。`,
    movie_colead: `W主演は2名の相性と話題の相乗効果が鍵です。両者のスコア構成のバランスと、ファン層のクロスオーバー可能性を確認してください。`,
    movie_support:`助演は主演を引き立てる演技力と知名度バランスが重要です。適度な知名度（Trendsスコア平均${s_trnd}）と高い感情スコアの組み合わせが理想的です。`,
    movie_voice:  `声優起用ではアニメ・ゲームファン層への訴求と、原作ファンへの説得力が重要です。SNSでの発信力が作品PRへの直接貢献となります。`,
    magazine_fashion: `ファッション誌では${hl('ビジュアルの魅力')}と${hl('トレンド感')}が購買動機の核です。感情スコアの高さがフォロワーのエンゲージメント率に相関します。`,
    magazine_weekly:  `週刊誌では${hl('話題性')}と${hl('ニュース性')}が掲載価値を左右します。ニュース件数（平均${s_news}）が読者関心の代替指標となります。`,
    magazine_mens:    `男性誌では${hl('ライフスタイル訴求力')}と${hl('男性読者層への影響力')}が重要です。M2・M3層（25〜44歳男性）へのデモグラフィック適合性を確認してください。`,
    magazine_womens:  `女性誌では${hl('共感力')}と${hl('憧れ感')}のバランスが核です。感情スコア（平均${s_sent}）がF1・F2層の購買意向に相関します。`,
    magazine_gravure: `グラビアでは${hl('ビジュアル訴求力')}と${hl('ファン層の熱量')}が販売部数に直結します。チャンネル登録者数（平均${s_subs}）がコアファン層の規模を示す指標となります。`,
    newspaper_national: `全国紙では${hl('社会的認知度')}と${hl('信頼性')}が最優先です。感情スコア（平均${s_sent}）の高さが企業広告起用の判断基準となります。`,
    newspaper_sports:   `スポーツ紙では${hl('エンタメ性')}と${hl('話題性')}が重視されます。Trendsスコア（平均${s_trnd}）が掲載後の反響規模を示します。`,
    newspaper_local:    `地方紙では${hl('地域への親しみ')}と${hl('幅広い年代への認知')}が重要です。全国的な知名度よりも親近感を重視した選定が効果的です。`,
    sns_instagram: `Instagramでは${hl('視覚的世界観')}と${hl('F1層（20〜34歳女性）への影響力')}が核です。感情スコアの高さ（平均${s_sent}）がフォロワーのエンゲージメント率に相関します。`,
    sns_x:         `X(Twitter)では${hl('リアルタイム話題性')}と${hl('テキスト発信力')}が重要です。TrendsスコアとニュースカバレッジがX上での言及拡散を予測する主要指標です。`,
    sns_tiktok:    `TikTokでは${hl('15〜24歳への訴求力')}と${hl('動画バズ創出力')}が重要です。YouTube再生数の伸び率（平均${s_views}）がショート動画適性の先行指標となります。`,
    sns_youtube:   `YouTubeでは${hl('チャンネル登録者数')}と${hl('再生維持率')}が収益性と影響力を決定します。既存チャンネル規模（平均${s_subs}）がコラボ効果を示します。`,
    sns_line:      `LINEでは${hl('スタンプ・コンテンツへの親近感')}と${hl('ファミリー層への認知')}が重要です。幅広い年代へのTrendsの安定性が長期的なブランド価値を示します。`,
    web_banner:    `バナー広告では${hl('視認性')}と${hl('クリック誘引力')}が成果の核です。高い感情スコアがブランドセーフティを確保し、クリック率を安定させます。`,
    web_tieup:     `タイアップ記事では${hl('SEO連動性')}と${hl('読者への情報信頼性')}が重要です。Trendsスコア（平均${s_trnd}）との連動が検索流入を最大化します。`,
    web_ambassador:`ブランドアンバサダーではSNS発信力の継続性が核となります。チャンネル登録者数（平均${s_subs}）が長期的なリーチ規模を保証します。`,
    web_video:     `動画広告では${hl('再生完了率')}と${hl('ブランドリフト')}が主要KPIです。YouTube再生数（平均${s_views}）が動画コンテンツへの親和性を示します。`,
  };

  const l2Body  = L2_MAP[`${mediaType}_${subKey}`] || `${subLbl}での${mediaLbl}起用において、${hl(Math.round(avgFit)+'/100')}のメディア適性スコアを基準に指標構成を踏まえた演出設計を行ってください。`;
  const l2Title = `${subLbl}での適性`;

  // トレンド判定テキスト（L2 に付加）
  const trendJudge = avgTrend == null ? ''
    : avgTrend >= 70
      ? `トレンド判定：${hlg('直近のTrendsが高水準（'+Math.round(avgTrend)+'/100）で旬のタイミングです。')}`
      : avgTrend >= 40
        ? `トレンド判定：安定した話題性（Trends ${Math.round(avgTrend)}/100）を維持しています。`
        : `トレンド判定：${hla('現在の話題性（Trends '+Math.round(avgTrend)+'/100）は控えめですが、出演による再浮上効果が期待できます。')}`;

  // ── リスク評価（Axis 3）────────────────────────────────
  let riskSec = '';
  if (avgSentiment != null) {
    if (avgSentiment >= 60)
      riskSec += `<p>感情スコアの平均は${hl(s_sent)}です。${hlg('ブランドセーフティは良好です。')}ネガティブ報道リスクは低水準にあり、安心して起用できる構成です。</p>`;
    else if (avgSentiment >= 40)
      riskSec += `<p>感情スコアの平均は${hla(s_sent)}です。${hla('⚠️ パブリックイメージの継続モニタリングを推奨します。')}一部のタレントでネガティブな報道が散見される可能性があります。</p>`;
    else
      riskSec += `<p>感情スコアの平均は${hlr(s_sent)}です。${hlr('🚨 炎上リスクが懸念されます。起用前に詳細調査を推奨します。')}ブランドへの影響を最小化するため、広報ラインとの事前協議を強く推奨します。</p>`;
  } else {
    riskSec = '<p>感情スコアのデータが不足しているため詳細判定ができません。過去のメディア報道を個別に確認してください。</p>';
  }
  selT.filter(t => t.latest?.news_sentiment != null && t.latest.news_sentiment < 40).forEach(t => {
    riskSec += `<p>個別警告：${nm(t.name)}の感情スコアは${hlr(t.latest.news_sentiment+'点')}で要注意レベルです。</p>`;
  });

  // ── 主要ターゲット（Axis 4）──────────────────────────────
  const SEG_F = ['10代女性','F1層（20代女性）','F1層（30代女性）','F2層（40代女性）','F3層（50代+女性）'];
  const SEG_M = ['10代男性','M1層（20代男性）','M1層（30代男性）','M2層（40代男性）','M3層（50代+男性）'];
  const allSegs = [
    ...demoF.map((v,i) => ({v, label:SEG_F[i], g:'女性'})),
    ...demoM.map((v,i) => ({v, label:SEG_M[i], g:'男性'})),
  ].sort((a,b) => b.v - a.v);
  const top1 = allSegs[0], top2 = allSegs[1];
  const broadReach = allSegs.filter(s => s.v >= top1.v * 0.85).length >= 4;
  let targetSec = `<p>このキャスティングは${hl(top1.label)}への訴求力が特に高い構成です（意向スコア${hl(top1.v+'%')}）。`;
  targetSec += `次点は${top2.label}（${top2.v}%）で、`;
  targetSec += broadReach
    ? `複数のセグメントに広くリーチできるバランス構成です。スポンサー訴求の幅が広がります。</p>`
    : `コアターゲットへの集中訴求型の構成です。セグメント特化型のプロモーション設計に向いています。</p>`;

  // ── Layer 3: 複数タレントの組み合わせ評価（2人以上のみ）──
  let L3_html = '';
  if (selT.length >= 2) {
    const scores    = selT.map(t => t.latest?.score ?? 0);
    const scoreRange= Math.max(...scores) - Math.min(...scores);
    const tHigh     = selT.reduce((a,b) => (a.latest?.score??0) >= (b.latest?.score??0) ? a : b);
    const tLow      = selT.reduce((a,b) => (a.latest?.score??0) <= (b.latest?.score??0) ? a : b);

    if (scoreRange < 20) {
      L3_html += `<p>選択された${hl(selT.length+'名')}はスコア構成が近く（差分${Math.round(scoreRange)}点）、安定した視聴体験を提供できる${hl('バランス型キャスティング')}です。視聴者層の分散リスクが低い構成です。</p>`;
    } else {
      L3_html += `<p>話題性（${nm(tHigh.name)}）と安定感（${nm(tLow.name)}）の対比が明確で、異なる視聴者層を同時に取り込める${hl('戦略的キャスティング')}です。スコア差${Math.round(scoreRange)}点の振れ幅がコンテンツの多様性を生み出します。</p>`;
    }

    selT.filter(t => (t.latest?.news_sentiment ?? 50) <= 35).forEach(t => {
      L3_html += `<p>${hlr('⚠️ '+t.name+'の感情スコアが'+t.latest.news_sentiment+'点と低めです。')}ブランドセーフティの観点から起用前にリスク精査を推奨します。</p>`;
    });
  }

  // ── 総合推奨度 ─────────────────────────────────────────────
  let starScore = 0;
  starScore += compat >= 82 ? 2.0 : compat >= 65 ? 1.5 : compat >= 50 ? 1.0 : 0.5;
  starScore += buzz   >= 72 ? 1.5 : buzz   >= 48 ? 1.0 : 0.5;
  starScore += avgFit >= 76 ? 1.0 : avgFit >= 56 ? 0.7 : 0.3;
  starScore += riskKey === 'low' ? 0.5 : riskKey === 'mid' ? 0.2 : 0;
  if (avgFav != null) starScore += avgFav >= 65 ? 0.2 : avgFav < 40 ? -0.2 : 0;
  const starInt = Math.max(1, Math.min(5, Math.round(starScore)));
  const starStr = '★'.repeat(starInt) + '☆'.repeat(5 - starInt);
  const recComments = {
    5: '即決推奨。数字・話題性・安全性の三拍子が揃っており、このまま制作に進むことを強くお勧めします。',
    4: '高推奨。主要指標が良好です。適切なプロモーション戦略を組み合わせれば高い成果が期待できます。',
    3: '条件付き推奨。強みと改善点が明確なキャスティングです。脚本・演出の作り込みで評価が大きく変わります。',
    2: '要検討。一部指標に懸念があります。代替キャストとの比較検討や制作コンセプトの再設計を推奨します。',
    1: '再考推奨。複数の指標でリスクが顕在化しています。キャスト構成を根本から見直すことを強くお勧めします。',
  }[starInt];

  // ── 描画 ─────────────────────────────────────────────────
  const badge = (lbl, cls) => `<span class="ibadge ${cls}" style="margin-left:auto">${lbl}</span>`;
  const riskBadge = avgSentiment == null ? 'ib-b' : avgSentiment >= 60 ? 'ib-g' : avgSentiment >= 40 ? 'ib-a' : 'ib-r';
  const riskBdgLbl = avgSentiment == null ? 'データ不足' : avgSentiment >= 60 ? 'リスク低' : avgSentiment >= 40 ? 'リスク中' : 'リスク高';
  const sections = [
    {
      icon: '📡', title: `メディア適性【${mediaLbl}】`,
      bdg:  badge(Math.round(avgFit)+'/100', avgFit >= 76 ? 'ib-g' : avgFit >= 56 ? 'ib-b' : 'ib-a'),
      body: L1.map(l => `<p>${l}</p>`).join(''),
    },
    {
      icon: '🎯', title: l2Title,
      bdg:  badge(subLbl, 'ib-b'),
      body: `<p>${l2Body}</p>${trendJudge ? `<p style="margin-top:6px;font-size:.84rem;color:var(--muted)">${trendJudge}</p>` : ''}`,
    },
    {
      icon: '⚠️', title: 'リスク評価',
      bdg:  badge(riskBdgLbl, riskBadge),
      body: riskSec,
    },
    {
      icon: '👥', title: '主要ターゲット',
      bdg:  badge(top1.label, 'ib-b'),
      body: targetSec,
    },
    ...(selT.length >= 2 ? [{
      icon: '🤝', title: 'キャスティング評価',
      bdg:  badge(selT.length+'名構成', 'ib-b'),
      body: L3_html,
    }] : []),
    {
      icon: '🏆', title: '総合推奨度',
      bdg: '',
      body: `
        <div class="ins-star-row">
          <span class="ins-stars">${starStr}</span>
          <span style="font-size:.85rem;font-weight:700;color:var(--muted)">${starInt}.0 / 5.0</span>
        </div>
        <div class="ins-rec-box">${recComments}</div>`,
    },
  ];

  document.getElementById('insight-body').innerHTML = sections.map(s => `
    <div class="ins-section">
      <div class="ins-head">
        <span class="ins-icon">${s.icon}</span>
        <span class="ins-title">${s.title}</span>
        ${s.bdg}
      </div>
      <div class="ins-body">${s.body}</div>
    </div>`).join('');
}

// ── エクスポート ──────────────────────────────────────────
document.getElementById('btn-pdf').onclick = () => window.print();

document.getElementById('btn-png').onclick = () => {
  const el = document.getElementById('results');
  if (typeof html2canvas === 'undefined') {
    alert('html2canvas の読み込みに失敗しました。ネット接続を確認してください。');
    return;
  }
  html2canvas(el, {scale:2, backgroundColor:'#f1f5f9', useCORS:true, logging:false})
    .then(canvas => {
      const a = document.createElement('a');
      a.download = `castscope_sim_${new Date().toISOString().slice(0,10)}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
};
</script>
</body>
</html>
