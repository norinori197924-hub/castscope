<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン – CastScope</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   デザイントークン（top.html と統一）
================================================================ */
:root {
  --navy-900: #0F2540;
  --blue-600:  #1E5FA8;
  --blue-50:   #EAF2FB;
  --slate-500: #5B6B7C;
  --white:     #FFFFFF;
  --amber-500: #E0A100;

  --font-head: 'Zen Kaku Gothic New', sans-serif;
  --font-body: 'Noto Sans JP', sans-serif;

  --radius-card: 14px;
  --shadow-card: 0 4px 32px rgba(15,37,64,.12);
}

/* ================================================================
   リセット & ベース
================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--blue-50);
  color: var(--navy-900);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

/* ================================================================
   ヘッダー（固定・左上ロゴのみ）
================================================================ */
#site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(15,37,64,.97);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,.08);
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 28px;
}

.logo-text {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: 1.25rem;
  color: var(--white);
  letter-spacing: .06em;
  transition: opacity .15s;
}
.logo-text:hover { opacity: .8; }
.logo-text span { color: var(--amber-500); }

/* ================================================================
   メインエリア（カード中央配置）
================================================================ */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 16px 40px;
}

/* ================================================================
   ログインカード
================================================================ */
.login-card {
  background: var(--white);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 44px 40px 36px;
  width: 100%;
  max-width: 420px;
}

.card-title {
  font-family: var(--font-head);
  font-weight: 900;
  font-size: 1.5rem;
  color: var(--navy-900);
  margin-bottom: 6px;
  letter-spacing: .02em;
}

.card-sub {
  font-size: .85rem;
  color: var(--slate-500);
  margin-bottom: 28px;
  line-height: 1.7;
}

/* ── エラーメッセージ（初期非表示） ── */
.error-box {
  display: none; /* JS で .style.display = 'block' により表示 */
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 20px;
  color: #B91C1C;
  font-size: .85rem;
  line-height: 1.6;
  display: none;
}
.error-box::before {
  content: '⚠ ';
}

/* ── フォームフィールド ── */
.field {
  margin-bottom: 20px;
}

.field label {
  display: block;
  font-size: .82rem;
  font-weight: 700;
  color: var(--navy-900);
  margin-bottom: 6px;
}

.field input[type="email"],
.field input[type="password"],
.field input[type="text"] {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid #CBD5E1;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: .92rem;
  color: var(--navy-900);
  background: var(--white);
  outline: none;
  transition: border-color .18s, box-shadow .18s;
  appearance: none;
  -webkit-appearance: none;
}
.field input:focus {
  border-color: var(--blue-600);
  box-shadow: 0 0 0 3px rgba(30,95,168,.12);
}

/* パスワード入力ラッパー（表示/非表示ボタン） */
.password-wrap {
  position: relative;
}
.password-wrap input {
  padding-right: 44px;
}
.toggle-pw {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: var(--slate-500);
  display: flex;
  align-items: center;
  transition: color .15s;
  line-height: 1;
}
.toggle-pw:hover { color: var(--navy-900); }

/* ── チェックボックス行 ── */
.checkbox-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .84rem;
  color: var(--slate-500);
  cursor: pointer;
  user-select: none;
}
.checkbox-label input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--blue-600);
  cursor: pointer;
  flex-shrink: 0;
}

.forgot-link {
  font-size: .82rem;
  color: var(--blue-600);
  font-weight: 500;
  transition: color .15s;
  white-space: nowrap;
}
.forgot-link:hover { color: var(--navy-900); text-decoration: underline; }

/* ── ログインボタン ── */
.btn-submit {
  width: 100%;
  padding: 13px;
  background: var(--blue-600);
  color: var(--white);
  font-family: var(--font-head);
  font-weight: 700;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background .18s, transform .18s, box-shadow .18s;
  box-shadow: 0 4px 14px rgba(30,95,168,.28);
  letter-spacing: .03em;
}
.btn-submit:hover {
  background: #2470c0;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(30,95,168,.36);
}
.btn-submit:active {
  transform: translateY(0);
}

/* ================================================================
   カード下フッターテキスト
================================================================ */
.card-footer {
  margin-top: 28px;
  text-align: center;
  font-size: .82rem;
  color: var(--slate-500);
  line-height: 1.8;
}
.card-footer a {
  color: var(--blue-600);
  font-weight: 500;
  transition: color .15s;
}
.card-footer a:hover { color: var(--navy-900); text-decoration: underline; }

/* ================================================================
   フッター
================================================================ */
footer {
  text-align: center;
  padding: 24px 16px;
  color: var(--slate-500);
  font-size: .75rem;
}

/* ================================================================
   レスポンシブ
================================================================ */
@media (max-width: 480px) {
  .login-card {
    padding: 36px 24px 28px;
  }
  .checkbox-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
}
</style>
</head>
<body>

<!-- ヘッダー -->
<header id="site-header">
  <a href="top.html" class="logo-text">Cast<span>Scope</span></a>
</header>

<!-- メインコンテンツ -->
<main>
  <div class="login-card">

    <h1 class="card-title">ログイン</h1>
    <p class="card-sub">CastScopeアカウントでログインしてください</p>

    <!-- エラー表示エリア（初期非表示） -->
    <div id="errorMessage" class="error-box" role="alert">
      メールアドレスまたはパスワードが正しくありません
    </div>

    <!-- ログインフォーム -->
    <form id="loginForm" novalidate>

      <!-- メールアドレス -->
      <div class="field">
        <label for="email">メールアドレス</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </div>

      <!-- パスワード -->
      <div class="field">
        <label for="password">パスワード</label>
        <div class="password-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="パスワードを入力"
            autocomplete="current-password"
            required
          >
          <!-- 表示/非表示切り替えボタン -->
          <button type="button" class="toggle-pw" id="togglePw" aria-label="パスワードを表示">
            <!-- 非表示アイコン（初期状態） -->
            <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <!-- 表示アイコン（パスワード表示中） -->
            <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- チェックボックス＆パスワード忘れ -->
      <div class="checkbox-row">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberMe" name="rememberMe">
          ログイン状態を保持する
        </label>
        <a href="#" class="forgot-link">パスワードをお忘れの方</a>
      </div>

      <!-- ログインボタン -->
      <button type="submit" class="btn-submit">ログイン</button>

    </form><!-- /loginForm -->

  </div><!-- /login-card -->

  <!-- カード下フッターテキスト -->
  <p class="card-footer">
    アカウントをお持ちでない方はお問い合わせください<br>
    <a href="top.html">← TOPページに戻る</a>
  </p>
</main>

<!-- フッター -->
<footer>
  &copy; 2025 CastScope. All rights reserved.
</footer>

<script>
/* ================================================================
   パスワード 表示/非表示 切り替え
================================================================ */
(function () {
  const pwInput  = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePw');
  const iconHide = document.getElementById('iconHide');
  const iconShow = document.getElementById('iconShow');

  toggleBtn.addEventListener('click', function () {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    iconHide.style.display = isHidden ? 'none'  : '';
    iconShow.style.display = isHidden ? ''       : 'none';
    toggleBtn.setAttribute('aria-label', isHidden ? 'パスワードを非表示' : 'パスワードを表示');
  });
})();

/* ================================================================
   ログインフォーム送信処理（ダミー実装）

   TODO: pileup-datalib.com 移行後に以下を置き換える
     - action="https://pileup-datalib.com/login.php" の POST 処理
     - または fetch('/api/login', { method: 'POST', body: ... }) に変更
     - 成功時: window.location.href = 'dashboard.html'
     - 失敗時: サーバーレスポンスのエラーメッセージを errorMessage に表示
================================================================ */
document.getElementById('loginForm').addEventListener('submit', function (e) {
  e.preventDefault();

  // TODO: pileup-datalib.com 移行後に login.php への fetch 処理に置き換える
  const email    = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorEl  = document.getElementById('errorMessage');

  // 現時点ではダミー：入力があれば常に index.html へ遷移
  if (email && password) {
    window.location.href = 'index.html'; // 将来的に dashboard.html へ変更
  } else {
    errorEl.style.display = 'block';
    // エラー表示後にメールフィールドへフォーカスを戻す
    document.getElementById('email').focus();
  }
});

/* 入力開始時にエラーを非表示に戻す */
['email', 'password'].forEach(function (id) {
  document.getElementById(id).addEventListener('input', function () {
    document.getElementById('errorMessage').style.display = 'none';
  });
});
</script>
</body>
</html>
