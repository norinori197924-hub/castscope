name: Weekly SNS Data Collection

on:
  schedule:
    - cron: '0 21 * * 0'  # 毎週日曜 21:00 UTC = 月曜 6:00 JST
  workflow_dispatch:        # 手動実行ボタン

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write       # castscope.db をコミット・プッシュするために必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check secrets
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "❌ YOUTUBE_API_KEY is EMPTY"
          else
            echo "✅ YOUTUBE_API_KEY is SET (length: ${#YOUTUBE_API_KEY})"
          fi
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Install dependencies
        run: pip install pytrends requests

      - name: Run SNS data collection
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWSAPI }}
        run: python collect_sns.py

      - name: Export JSON for dashboard
        run: python export_json.py

      - name: Commit and push artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f castscope.db docs/scores.json channel_cache.json
          if git diff --cached --quiet; then
            echo "変更なし。スキップ。"
          else
            git commit -m "data: collect $(date +'%Y-%m-%d')"
            git push
          fi
